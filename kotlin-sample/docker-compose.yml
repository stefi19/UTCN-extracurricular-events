services:
  postgres:
    image: postgres:16
    container_name: utcnevents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: utcnevents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - utcnevents_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utcnevents"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  utcnevents_pgdata:

