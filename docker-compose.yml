services:
  postgres:
    image: postgres:15-alpine
    container_name: utcn-events-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: utcnevents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - utcnevents_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utcnevents"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - utcn-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: utcn-events-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - utcn-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: utcn-events-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - utcn-network

  backend:
    build: .
    container_name: utcn-events-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: utcnevents
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      JWT_SECRET: your-secret-key-change-in-production
      JWT_ISSUER: utcn-events
      JWT_AUDIENCE: utcn-events-users
      JWT_REALM: utcn-events
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - utcn-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  notification-service:
    build: ./notification-service
    container_name: utcn-events-notification
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@utcn-events.local
      SMTP_AUTH: "false"
      SMTP_STARTTLS: "false"
      REMINDER_HOURS_BEFORE: "3"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - utcn-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: utcn-events-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - utcn-network

volumes:
  utcnevents_pgdata:
    driver: local

networks:
  utcn-network:
    driver: bridge

